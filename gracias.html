<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Pago recibido! - Truko DTF</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --negro: #0A0A0F;
  --cyan: #00B4FF;
  --magenta: #FF0080;
  --amarillo: #FFD600;
  --verde: #00C853;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--negro);
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

.card {
  background: #16161e;
  border: 1px solid #2a2a3a;
  border-radius: 20px;
  padding: 40px 32px;
  max-width: 480px;
  width: 100%;
  text-align: center;
}

.check-icon {
  width: 80px;
  height: 80px;
  background: var(--verde);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  font-size: 40px;
}

.titulo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem;
  color: var(--amarillo);
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.subtitulo {
  color: #aaa;
  font-size: 0.95rem;
  margin-bottom: 32px;
  line-height: 1.5;
}

.subtitulo span {
  color: var(--cyan);
  font-weight: 700;
}

.form-titulo {
  font-size: 0.85rem;
  font-weight: 700;
  color: #777;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
  text-align: left;
}

.form-group {
  margin-bottom: 14px;
  text-align: left;
}

label {
  display: block;
  font-size: 0.8rem;
  color: #888;
  margin-bottom: 6px;
  font-weight: 600;
}

input {
  width: 100%;
  background: #0e0e16;
  border: 1px solid #2a2a3a;
  border-radius: 10px;
  padding: 12px 16px;
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.95rem;
  transition: border-color 0.2s;
  outline: none;
}

input:focus {
  border-color: var(--cyan);
}

input::placeholder {
  color: #444;
}

.btn-whatsapp {
  width: 100%;
  background: #25D366;
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 16px;
  font-family: 'Montserrat', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 24px;
  transition: background 0.2s, transform 0.1s;
}

.btn-whatsapp:hover { background: #1ebe5a; }
.btn-whatsapp:active { transform: scale(0.98); }

.btn-whatsapp svg {
  width: 22px;
  height: 22px;
  fill: #fff;
}

.aviso {
  font-size: 0.78rem;
  color: #555;
  margin-top: 16px;
  line-height: 1.5;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  color: var(--cyan);
  letter-spacing: 3px;
  margin-bottom: 32px;
}
</style>
</head>
<body>

<div class="logo">TRUKO DTF TEXTIL</div>

<div class="card">
  <div class="check-icon">✓</div>
  <div class="titulo">¡Pago recibido!</div>
  <p class="subtitulo">
    Tu pedido está en cola. Lo procesamos en <span>24-48hs hábiles</span>.<br>
    Completá tus datos para coordinar el envío por WhatsApp.
  </p>

  <div class="form-titulo">Datos de envío</div>

  <div class="form-group">
    <label>Nombre y apellido</label>
    <input type="text" id="nombre" placeholder="Ej: Juan Pérez">
  </div>
  <div class="form-group">
    <label>Número de documento (DNI)</label>
    <input type="text" id="dni" placeholder="Ej: 38123456" inputmode="numeric">
  </div>
  <div class="form-group">
    <label>Ciudad</label>
    <input type="text" id="ciudad" placeholder="Ej: Córdoba">
  </div>
  <div class="form-group">
    <label>Localidad / Barrio</label>
    <input type="text" id="localidad" placeholder="Ej: Nueva Córdoba">
  </div>
  <div class="form-group">
    <label>Dirección completa</label>
    <input type="text" id="direccion" placeholder="Calle, número, piso/dpto">
  </div>
  <div class="form-group">
    <label>Código postal</label>
    <input type="text" id="cp" placeholder="Ej: 5000" inputmode="numeric">
  </div>

  <button class="btn-whatsapp" onclick="enviarWhatsApp()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    Coordinar envío por WhatsApp
  </button>

  <p class="aviso">Al hacer clic se abrirá WhatsApp con tus datos cargados. Enviá el mensaje para confirmar el envío.</p>
</div>

<script>
function enviarWhatsApp() {
  const nombre = document.getElementById('nombre').value.trim();
  const dni = document.getElementById('dni').value.trim();
  const ciudad = document.getElementById('ciudad').value.trim();
  const localidad = document.getElementById('localidad').value.trim();
  const direccion = document.getElementById('direccion').value.trim();
  const cp = document.getElementById('cp').value.trim();

  if (!nombre || !dni || !ciudad || !localidad || !direccion || !cp) {
    alert('Por favor completá todos los datos antes de continuar.');
    return;
  }

  const mensaje = `¡Hola Truko! 👋 Acabo de realizar un pago y quiero coordinar el envío.

📋 *Datos de envío:*
• Nombre: ${nombre}
• DNI: ${dni}
• Ciudad: ${ciudad}
• Localidad: ${localidad}
• Dirección: ${direccion}
• Código postal: ${cp}`;

  const numero = '543518917984';
  const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;
  window.open(url, '_blank');
}
</script>

</body>
</html>
